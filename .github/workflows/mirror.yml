name: Mirror to Second Repo

on:
  push:
    branches:
      - main

jobs:
  mirror_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          repository: avinashnandakumar/world-cup-fantasy-roast-squad
          token: ${{ secrets.MIRROR_TOKEN }}
          ref: main
          path: mirror

      - name: Copy source into mirror without config.js
        run: |
          rsync -a --delete \
            --exclude ".git/" \
            --exclude "config.js" \
            source/ mirror/

      - name: Commit and push mirror changes
        run: |
          cd mirror
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "Mirror already up to date."
            exit 0
          fi

          git add -A
          git commit -m "Mirror source repo changes"
          git push origin main
