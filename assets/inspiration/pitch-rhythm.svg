    <circle cx="600" cy="360" r="5" fill="#f7fff8" opacity=".3"/>
    <path d="M54 230h170v260H54M1146 230H976v260h170"/>
    <path d="M54 285h82v150H54M1146 285h-82v150h82"/>
    <path d="M224 300a96 96 0 0 1 0 120M976 300a96 96 0 0 0 0 120"/>
  </g>
  <g stroke="#f7fff8" stroke-opacity=".06">
    <path d="M0 120h1200M0 240h1200M0 480h1200M0 600h1200"/>
