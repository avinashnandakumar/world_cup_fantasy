<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Abstract soccer pitch rhythm</title>
  <desc id="desc">A dark green soccer pitch inspired background with field lines and soft color washes.</desc>
  <defs>
    <linearGradient id="grass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#073b2f"/>
      <stop offset="0.48" stop-color="#12563c"/>
      <stop offset="1" stop-color="#082033"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="15%" cy="76%" r="44%">
      <stop offset="0" stop-color="#ffd76f" stop-opacity=".36"/>
      <stop offset="1" stop-color="#ffd76f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="88%" cy="22%" r="38%">
      <stop offset="0" stop-color="#34d8ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#34d8ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="mow" width="120" height="720" patternUnits="userSpaceOnUse">
      <rect width="60" height="720" fill="#ffffff" opacity=".025"/>
    </pattern>
  </defs>
  <rect width="1200" height="720" fill="url(#grass)"/>
  <rect width="1200" height="720" fill="url(#mow)"/>
  <rect width="1200" height="720" fill="url(#glowGold)"/>
  <rect width="1200" height="720" fill="url(#glowCyan)"/>
